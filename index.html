<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronometro y Temporizador Online Gratis | ConfiguroWeb</title>
    <meta name="description" content="Cronometro y temporizador online gratis con cuenta regresiva. Guarda vueltas y controla tus tiempos.">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; }</style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between">
    <header class="border-b border-slate-800 sticky top-0 z-50 bg-slate-900/95 backdrop-blur">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <span class="text-xl font-bold text-amber-500">Configuro<span class="text-slate-100">Web</span></span>
            <a href="https://configuroweb.com/tag/gratis" class="text-sm font-medium text-slate-400 hover:text-amber-500">← Apps Gratuitas</a>
        </div>
    </header>
    <main class="max-w-2xl mx-auto px-4 py-8 flex-grow w-full">
        <div class="text-center mb-8">
            <h1 class="text-2xl md:text-3xl font-bold mb-2">Cronómetro y Temporizador</h1>
            <p class="text-slate-400 text-sm">Mide tiempos con precisión o haz una cuenta regresiva.</p>
        </div>

        <div class="flex justify-center gap-2 mb-6">
            <button onclick="setMode('chrono')" id="tab-chrono" class="px-5 py-2 rounded-xl text-sm font-semibold bg-amber-500 text-slate-900 cursor-pointer">Cronómetro</button>
            <button onclick="setMode('timer')" id="tab-timer" class="px-5 py-2 rounded-xl text-sm font-semibold border border-slate-700 hover:border-amber-500 cursor-pointer">Temporizador</button>
        </div>

        <div class="bg-slate-800/50 border border-slate-700 rounded-2xl p-8 text-center">
            <p id="display" class="mono text-6xl md:text-7xl font-bold text-amber-400 mb-8 tabular-nums">00:00:00.00</p>
            
            <div id="timerSetup" class="hidden mb-6">
                <div class="flex justify-center gap-3">
                    <div><input type="number" id="setMin" value="5" min="0" max="999" class="w-20 bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-center text-lg"><p class="text-xs text-slate-500 mt-1">Min</p></div>
                    <div><input type="number" id="setSec" value="0" min="0" max="59" class="w-20 bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-center text-lg"><p class="text-xs text-slate-500 mt-1">Seg</p></div>
                </div>
            </div>

            <div class="flex justify-center gap-3">
                <button id="startBtn" onclick="start()" class="bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold px-8 py-3 rounded-xl cursor-pointer">Iniciar</button>
                <button id="lapBtn" onclick="lap()" class="hidden bg-slate-700 hover:bg-slate-600 font-semibold px-6 py-3 rounded-xl cursor-pointer">Vuelta</button>
                <button id="resetBtn" onclick="reset()" class="bg-rose-500/80 hover:bg-rose-500 font-semibold px-6 py-3 rounded-xl cursor-pointer">Reiniciar</button>
            </div>
        </div>

        <div id="laps" class="mt-6 space-y-2 hidden"></div>
    </main>
    <footer class="border-t border-slate-800 mt-12">
        <div class="max-w-5xl mx-auto px-4 py-6 text-center text-xs text-slate-500">&copy; 2026 ConfiguroWeb.</div>
    </footer>
    <script>
        let mode = 'chrono', running = false, interval, elapsed = 0, startTime = 0, timerEnd = 0, lapsArr = [];

        function setMode(m) {
            mode = m; reset();
            document.getElementById('tab-chrono').className = m === 'chrono' ? 'px-5 py-2 rounded-xl text-sm font-semibold bg-amber-500 text-slate-900 cursor-pointer' : 'px-5 py-2 rounded-xl text-sm font-semibold border border-slate-700 hover:border-amber-500 cursor-pointer';
            document.getElementById('tab-timer').className = m === 'timer' ? 'px-5 py-2 rounded-xl text-sm font-semibold bg-amber-500 text-slate-900 cursor-pointer' : 'px-5 py-2 rounded-xl text-sm font-semibold border border-slate-700 hover:border-amber-500 cursor-pointer';
            document.getElementById('timerSetup').classList.toggle('hidden', m !== 'timer');
            document.getElementById('lapBtn').classList.toggle('hidden', m !== 'chrono');
        }

        function fmt(ms) {
            const h = Math.floor(ms / 3600000);
            const m = Math.floor((ms % 3600000) / 60000);
            const s = Math.floor((ms % 60000) / 1000);
            const cs = Math.floor((ms % 1000) / 10);
            return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
        }

        function start() {
            if (running) { pause(); return; }
            running = true;
            document.getElementById('startBtn').innerText = 'Pausa';
            document.getElementById('startBtn').className = 'bg-amber-500 hover:bg-amber-400 text-slate-900 font-bold px-8 py-3 rounded-xl cursor-pointer';
            
            if (mode === 'chrono') {
                startTime = Date.now() - elapsed;
                interval = setInterval(() => { elapsed = Date.now() - startTime; update(); }, 10);
            } else {
                const min = parseInt(document.getElementById('setMin').value) || 0;
                const sec = parseInt(document.getElementById('setSec').value) || 0;
                if (!timerEnd) timerEnd = Date.now() + (min*60+sec)*1000;
                else timerEnd = Date.now() + elapsed;
                interval = setInterval(() => { elapsed = timerEnd - Date.now(); if (elapsed <= 0) { elapsed = 0; update(); finishTimer(); } update(); }, 10);
            }
        }

        function pause() {
            running = false;
            clearInterval(interval);
            document.getElementById('startBtn').innerText = 'Continuar';
            document.getElementById('startBtn').className = 'bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold px-8 py-3 rounded-xl cursor-pointer';
        }

        function update() { document.getElementById('display').innerText = fmt(Math.max(0, elapsed)); }

        function lap() {
            lapsArr.unshift({ n: lapsArr.length + 1, t: elapsed });
            renderLaps();
        }

        function renderLaps() {
            const c = document.getElementById('laps');
            c.classList.remove('hidden');
            c.innerHTML = lapsArr.map(l => `<div class="flex justify-between bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-2 mono text-sm"><span class="text-slate-400">Vuelta ${l.n}</span><span>${fmt(l.t)}</span></div>`).join('');
        }

        function finishTimer() { clearInterval(interval); running = false; document.getElementById('display').className = 'mono text-6xl md:text-7xl font-bold text-rose-400 mb-8 tabular-nums'; }

        function reset() {
            clearInterval(interval); running = false; elapsed = 0; timerEnd = 0; lapsArr = [];
            document.getElementById('display').innerText = '00:00:00.00';
            document.getElementById('display').className = 'mono text-6xl md:text-7xl font-bold text-amber-400 mb-8 tabular-nums';
            document.getElementById('startBtn').innerText = 'Iniciar';
            document.getElementById('startBtn').className = 'bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold px-8 py-3 rounded-xl cursor-pointer';
            document.getElementById('laps').classList.add('hidden');
            document.getElementById('laps').innerHTML = '';
        }
    </script>
</body>
</html>
